<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workshop Slides | AI Automation Zero to Hero</title>
  <meta name="description" content="HTML slide engine pentru workshopul AI Automation Zero to Hero.">
  <link rel="stylesheet" href="styles.css?v=day1-wow-command-v2-20260522">
</head>
<body>
  <main class="deck-shell" aria-label="Workshop slide deck">
    <section class="slide-stage" id="slideStage" aria-live="polite">
      <div class="loading-card">
        <span class="kicker">Slides</span>
        <h1>Se incarca deck-ul...</h1>
      </div>
    </section>

    <aside class="speaker-notes" id="speakerNotes" hidden>
      <strong>Speaker notes</strong>
      <p id="speakerNotesText"></p>
    </aside>

    <nav class="deck-controls" aria-label="Navigare slide-uri">
      <button class="control-button" id="prevSlide" type="button" aria-label="Slide anterior">
        <span aria-hidden="true">&larr;</span>
      </button>
      <div class="deck-status" aria-live="polite">
        <span id="slideCounter">0 / 0</span>
        <div class="progress-track" aria-hidden="true">
          <i id="progressBar"></i>
        </div>
      </div>
      <button class="control-button" id="nextSlide" type="button" aria-label="Slide urmator">
        <span aria-hidden="true">&rarr;</span>
      </button>
    </nav>
  </main>

  <script type="module" src="engine.js?v=day1-wow-command-v2-20260522"></script>
</body>
</html>
